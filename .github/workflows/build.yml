name: Cloud Android APK Builder

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Gradle System
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.5 # Forces GitHub to handle the engine version automatically

    # We use global 'gradle' instead of local './gradlew' since we skipped the wrapper files
     scrimmage-name: Build Debug APK via Cloud Engine
      run: gradle assembleDebug

    - name: Upload Finished APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PisoPhone_Rental_App
        path: app/build/outputs/apk/debug/app-debug.apk
